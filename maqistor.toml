# Optional — defaults shown in comments
# listen = "0.0.0.0:8080"
# database_path = "./data/maqistor.db"

# Durable ingest policy. Batching adapts automatically.
# [persistence]
# durability = "balanced"      # "strict" prioritizes crash durability
# startup = "recover"          # "preserve" leaves stale leases untouched
# ewma_window = 16             # optional smoothing window
# [persistence.limits]         # optional runtime safety caps
# batch_size_min = 8
# batch_size_max = 1024
# batch_wait_min_ms = 1
# batch_wait_max_ms = 100
# [persistence.adaptation]    # optional advanced adjustment factors
# batch_probe_factor = 1.10   # must be greater than one
# batch_backoff_factor = 0.80 # must be between zero and one

[[workers]]
name = "example"
replicas = 1
concurrency = 1
max_retries = 3
