# Benchmark test config
listen = "127.0.0.1:18081"
database_path = "./benchmark/data/maqistor.db"

[persistence]
durability = "balanced"
ewma_window = 4

[persistence.limits]
batch_size_min = 256
batch_size_max = 4096
batch_wait_min_ms = 1
batch_wait_max_ms = 2

[persistence.adaptation]
batch_probe_factor = 1.25
batch_backoff_factor = 0.80

[[workers]]
name = "bench"
replicas = 1
concurrency = 1
max_retries = 3
